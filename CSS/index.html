<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        p   {           /* (0,0,1)  ha un tag*/
        color: rebeccapurple;
        }
        
        
        p.par{          /* (0,1,1) ha una classe*/
            color:green;
            
        }
        
        .grazioso.par{     /* (0,2,1) ha due classi e un tag */
            color: yellow;
        }
    
        </style>
       
</head>
<body>
    <p class="par grazioso">codigo lagarto</p>
    <p class="grazioso">codigo lagarto</p>
    <p class="par">daaaa</p>
</body>
</html>
